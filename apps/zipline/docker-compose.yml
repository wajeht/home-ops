services:
  zipline:
    container_name: zipline
    image: ghcr.io/diced/zipline:v4
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://zipline:${POSTGRES_PASSWORD}@zipline-db:5432/zipline
      - TZ=America/Chicago
    depends_on:
      zipline-db:
        condition: service_healthy
    volumes:
      - /home/jaw/data/zipline/uploads:/zipline/uploads
      - /home/jaw/data/zipline/public:/zipline/public
      - /home/jaw/data/zipline/themes:/zipline/themes
    networks:
      - traefik
      - zipline-internal
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://0.0.0.0:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zipline.rule=Host(`img.jaw.dev`)"
      - "traefik.http.routers.zipline.entrypoints=websecure"
      - "traefik.http.routers.zipline.middlewares=google-auth@file"
      - "traefik.http.services.zipline.loadbalancer.server.port=3000"

  zipline-db:
    container_name: zipline-db
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    env_file:
      - .env
    environment:
      - POSTGRES_USER=zipline
      - POSTGRES_DB=zipline
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /home/jaw/data/zipline/db:/var/lib/postgresql/data
    networks:
      - zipline-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zipline"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  zipline-borgmatic:
    container_name: zipline-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /home/jaw/data/zipline:/source/data:ro
      - /home/jaw/backup/zipline:/repository
      - /home/jaw/data/zipline/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
      - zipline-internal
    depends_on:
      zipline-db:
        condition: service_healthy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
  zipline-internal:
