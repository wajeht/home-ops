services:
  favicon:
    image: ghcr.io/wajeht/favicon:25964fe
    environment:
      TZ: America/Chicago
    volumes:
      - /home/jaw/data/favicon:/app/data
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.favicon.rule=Host(`favicon.jaw.dev`)"
      - "traefik.http.routers.favicon.entrypoints=websecure"
      - "traefik.http.routers.favicon.middlewares=rate-limit-global@file"
      - "traefik.http.services.favicon.loadbalancer.server.port=80"

  favicon-borgmatic:
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/favicon:/source/data
      - /home/jaw/data/favicon/borg:/repository
      - /home/jaw/data/favicon/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
