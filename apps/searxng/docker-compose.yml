services:
  searxng:
    container_name: searxng
    image: searxng/searxng@sha256:3e11c8454e62de8b5cbb5ba7f5b9568a6eb3d40414af1a884d435bf79b3bfe9f
    env_file:
      - .env
    environment:
      - SEARXNG_BASE_URL=https://search.jaw.dev
    volumes:
      - /home/jaw/data/searxng:/etc/searxng
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`search.jaw.dev`)"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.middlewares=google-auth@file"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"
networks:
  traefik:
    external: true
