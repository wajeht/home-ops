services:
  searxng:
    image: searxng/searxng@sha256:733c25efc9c7d195cc11974b75abff935e30c33d1f88dbcf0a6accd772718608
    env_file:
      - .env
    environment:
      - SEARXNG_BASE_URL=https://search.jaw.dev
    volumes:
      - /home/jaw/data/searxng:/etc/searxng
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    init: true # proper PID 1 signal handling and zombie reaping
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 200 # fork bomb protection
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`search.jaw.dev`)"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.middlewares=google-auth@file"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"

networks:
  traefik:
    external: true
