services:
  stirling-pdf:
    container_name: stirling-pdf
    image: frooodle/s-pdf:2.7.0@sha256:ddc72cce76cb9e85df43e34115dbbacec0dd46baf607c0eecabae61e2d69087d
    environment:
      - TZ=America/Chicago
      - DOCKER_ENABLE_SECURITY=true
    volumes:
      - /home/jaw/data/stirling-pdf:/usr/share/tessdata
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1.5G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stirling-pdf.rule=Host(`pdf.jaw.dev`)"
      - "traefik.http.routers.stirling-pdf.entrypoints=websecure"
      - "traefik.http.routers.stirling-pdf.middlewares=google-auth@file"
      - "traefik.http.services.stirling-pdf.loadbalancer.server.port=8080"
networks:
  traefik:
    external: true
