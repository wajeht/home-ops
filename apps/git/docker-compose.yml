services:
  git:
    image: ghcr.io/wajeht/git:e7e0fc8
    environment:
      - TZ=America/Chicago
      - APP_PORT=80
      - APP_ENV=production
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.git.rule=Host(`git.jaw.dev`)"
      - "traefik.http.routers.git.entrypoints=websecure"
      - "traefik.http.routers.git.middlewares=rate-limit-global@file"
      - "traefik.http.services.git.loadbalancer.server.port=80"
networks:
  traefik:
    external: true
