services:
  ufc:
    image: ghcr.io/wajeht/ufc:62de5d7
    environment:
      TZ: America/Chicago
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ufc.rule=Host(`ufc.jaw.dev`)"
      - "traefik.http.routers.ufc.entrypoints=websecure"
      - "traefik.http.routers.ufc.middlewares=rate-limit-global@file"
      - "traefik.http.services.ufc.loadbalancer.server.port=80"
networks:
  traefik:
    external: true
