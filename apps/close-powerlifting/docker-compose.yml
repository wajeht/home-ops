services:
  close-powerlifting:
    image: ghcr.io/wajeht/close-powerlifting:1735baf
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/close-powerlifting:/usr/src/app/dist/src/db/sqlite
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.close-powerlifting.rule=Host(`closepowerlifting.com`) || Host(`www.closepowerlifting.com`)"
      - "traefik.http.routers.close-powerlifting.entrypoints=websecure"
      - "traefik.http.routers.close-powerlifting.middlewares=rate-limit-global@file"
      - "traefik.http.services.close-powerlifting.loadbalancer.server.port=80"
      - "traefik.http.routers.close-powerlifting-redirect.rule=Host(`close-powerlifting.jaw.dev`)"
      - "traefik.http.routers.close-powerlifting-redirect.entrypoints=websecure"
      - "traefik.http.routers.close-powerlifting-redirect.middlewares=close-powerlifting-redirect"
      - "traefik.http.routers.close-powerlifting-redirect.service=noop@internal"
      - "traefik.http.middlewares.close-powerlifting-redirect.redirectregex.regex=^https?://close-powerlifting\\.jaw\\.dev(.*)$"
      - "traefik.http.middlewares.close-powerlifting-redirect.redirectregex.replacement=https://closepowerlifting.com$$1"
      - "traefik.http.middlewares.close-powerlifting-redirect.redirectregex.permanent=true"

  close-powerlifting-borgmatic:
    container_name: close-powerlifting-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/close-powerlifting:/source/data
      - /home/jaw/backup/close-powerlifting:/repository
      - /home/jaw/data/close-powerlifting/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
