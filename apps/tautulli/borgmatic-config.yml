source_directories:
  - /source/data

exclude_patterns:
  - "*/borgmatic"
  - "*/tautulli.db*"
  - "*/cache"
  - "*/logs"
  - "*.lock"

sqlite_databases:
  - name: tautulli
    path: /source/data/tautulli.db

repositories:
  - path: /repository
    label: tautulli

archive_name_format: "tautulli-{now:%Y-%m-%d-%H%M%S}"
compression: zstd,3

keep_daily: 7
keep_weekly: 4
keep_monthly: 6

checks:
  - name: repository
    frequency: 1 week
  - name: archives
    frequency: 1 week

check_last: 3

ntfy:
  topic: borgmatic
  server: http://ntfy:80
  finish:
    title: "tautulli backup complete"
    message: "tautulli backup finished"
    priority: min
    tags: white_check_mark
  fail:
    title: "tautulli backup FAILED"
    message: "tautulli backup failed"
    priority: max
    tags: skull
  states:
    - finish
    - fail
