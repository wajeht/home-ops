services:
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:2@sha256:32c352a235fd10f98b3f64a6a4345d3c0c7f4e8be7810d2e1e867f7fe2e48ba2
    volumes:
      - /home/jaw/data/uptime-kuma:/app/data
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`status.jaw.dev`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.middlewares=google-auth@file"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
  uptime-kuma-borgmatic:
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/uptime-kuma:/source/data
      - /home/jaw/data/uptime-kuma/borg:/repository
      - /home/jaw/data/uptime-kuma/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
