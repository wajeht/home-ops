- resources:
    expanded: true
    cpu: true
    memory: true
    cputemp: true
    units: imperial
    uptime: true

- resources:
    expanded: true
    disk:
      - /
      - /host/nas

- openmeteo:
    label: Amarillo
    latitude: 35.222
    longitude: -101.8313
    units: imperial
    cache: 5

- unifi_console:
    url: https://192.168.4.1
    key: "{{HOMEPAGE_VAR_UNIFI_KEY}}"

- datetime:
    text_size: l
    format:
      dateStyle: short
      timeStyle: short
