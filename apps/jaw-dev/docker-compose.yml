services:
  www:
    image: ghcr.io/wajeht/jaw.dev:ff7e344
    environment:
      - TZ=America/Chicago
      - HTTP_PORT=80
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jaw-dev.rule=Host(`jaw.dev`) || Host(`www.jaw.dev`)"
      - "traefik.http.routers.jaw-dev.entrypoints=websecure"
      - "traefik.http.routers.jaw-dev.middlewares=rate-limit-global@file"
      - "traefik.http.services.jaw-dev.loadbalancer.server.port=80"
networks:
  traefik:
    external: true
