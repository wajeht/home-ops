services:
  bitmagnet:
    container_name: bitmagnet
    image: ghcr.io/bitmagnet-io/bitmagnet:v0.10.0@sha256:cf2c16fac5b51f1c18e630b4710175d35d7e44b83012cfd05a2b43712feec05e
    command: worker run --all
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - POSTGRES_HOST=bitmagnet-db
      - POSTGRES_DB=bitmagnet
    depends_on:
      bitmagnet-db:
        condition: service_healthy
    ports:
      - "3334:3334/tcp"
      - "3334:3334/udp"
    networks:
      - traefik
      - bitmagnet-internal
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:3333"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bitmagnet.rule=Host(`bitmagnet.jaw.dev`)"
      - "traefik.http.routers.bitmagnet.entrypoints=websecure"
      - "traefik.http.routers.bitmagnet.middlewares=google-auth@file"
      - "traefik.http.services.bitmagnet.loadbalancer.server.port=3333"
  bitmagnet-db:
    container_name: bitmagnet-db
    image: postgres:18.1-alpine@sha256:aa6eb304ddb6dd26df23d05db4e5cb05af8951cda3e0dc57731b771e0ef4ab29
    env_file:
      - .env
    environment:
      - POSTGRES_DB=bitmagnet
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /home/jaw/data/bitmagnet/db:/var/lib/postgresql/data
    networks:
      - bitmagnet-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  bitmagnet-borgmatic:
    container_name: bitmagnet-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - EXTRA_PKGS=postgresql18-client
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /home/jaw/backup/bitmagnet:/repository
      - /home/jaw/data/bitmagnet/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
      - bitmagnet-internal
    depends_on:
      bitmagnet-db:
        condition: service_healthy
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
  bitmagnet-internal:
