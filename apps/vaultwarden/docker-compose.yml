services:
  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:1.35.3@sha256:1ca2e2098ba9ab9e46004f4ee61a3be6080ffee3ed41018a95c4b0fb6454a54b
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - DOMAIN=https://vault.jaw.dev
      - SIGNUPS_ALLOWED=false
      - INVITATIONS_ALLOWED=true
      - SHOW_PASSWORD_HINT=false
    volumes:
      - /home/jaw/data/vaultwarden:/data
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.jaw.dev`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.middlewares=rate-limit-global@file"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
  vaultwarden-borgmatic:
    container_name: vaultwarden-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/vaultwarden:/source/data
      - /home/jaw/backup/vaultwarden:/repository
      - /home/jaw/data/vaultwarden/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "borgmatic --version"]
      interval: 1m
      timeout: 10s
      retries: 3
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
  backup:
    external: true
