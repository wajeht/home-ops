sqlite_databases:
  - name: calendar
    path: /source/data/db.sqlite

repositories:
  - path: /repository
    label: calendar

archive_name_format: "calendar-{now:%Y-%m-%d-%H%M%S}"
compression: zstd,3

keep_daily: 7
keep_weekly: 4
keep_monthly: 6

checks:
  - name: repository
    frequency: 1 week
  - name: archives
    frequency: 1 week

check_last: 3

ntfy:
  topic: borgmatic
  server: http://ntfy:80
  finish:
    title: "calendar db backup complete"
    message: "calendar database backup finished"
    priority: min
    tags: white_check_mark
  fail:
    title: "calendar db backup FAILED"
    message: "calendar database backup failed"
    priority: max
    tags: skull
  states:
    - finish
    - fail
