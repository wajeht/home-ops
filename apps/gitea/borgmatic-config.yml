sqlite_databases:
  - name: gitea
    path: /source/data/gitea/gitea.db

repositories:
  - path: /repository
    label: gitea

archive_name_format: "gitea-{now:%Y-%m-%d-%H%M%S}"
compression: zstd,3

keep_daily: 30
keep_weekly: 12
keep_monthly: 12

checks:
  - name: repository
    frequency: 1 week
  - name: archives
    frequency: 1 week

check_last: 3

ntfy:
  topic: borgmatic
  server: http://ntfy:80
  finish:
    title: "gitea db backup complete"
    message: "gitea database backup finished"
    priority: min
    tags: white_check_mark
  fail:
    title: "gitea db backup FAILED"
    message: "gitea database backup failed"
    priority: max
    tags: skull
  states:
    - finish
    - fail
