services:
  mirror-sync:
    container_name: gitea-mirror-sync
    image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl jq bash
        while true; do
          echo "=== Mirror sync started at $$(date) ==="
          /scripts/mirror-sync.sh || echo "Sync failed"
          echo "=== Sleeping 1h ==="
          sleep 3600
        done
    environment:
      - GITEA_URL=http://gitea:3000
      - GITHUB_USER=wajeht
    env_file:
      - .env
    volumes:
      - ./mirror-sync.sh:/scripts/mirror-sync.sh:ro
    networks:
      - traefik
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  gitea:
    container_name: gitea
    image: gitea/gitea:1.25@sha256:17d18218be2dad1f8ed402a4f906989505c90ab8b66ee9befcecfb5d470133e7
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__server__ROOT_URL=https://gitea.jaw.dev/
      - GITEA__server__DOMAIN=gitea.jaw.dev
      - GITEA__mirror__ENABLED=true
      - GITEA__mirror__DEFAULT_INTERVAL=1h
      - GITEA__service__DISABLE_REGISTRATION=true
    env_file:
      - .env
    volumes:
      - /home/jaw/data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`gitea.jaw.dev`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.middlewares=google-auth@file"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"

  gitea-borgmatic:
    container_name: gitea-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/gitea:/source/data
      - /home/jaw/backup/gitea:/repository
      - /home/jaw/data/gitea/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
