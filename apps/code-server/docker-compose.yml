services:
  code-server:
    container_name: code-server
    image: codercom/code-server:4.109.5@sha256:f9ccfeb5a3de80d16342a6a842519c481522d80aafe65fb24a16393235a34f71
    command: ["--auth", "password", "/home/coder/home/dev"]
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/code-server:/home/coder/.config
      - /home/jaw:/home/coder/home
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.code-server.rule=Host(`code.jaw.dev`)"
      - "traefik.http.routers.code-server.entrypoints=websecure"
      - "traefik.http.routers.code-server.middlewares=google-auth@file"
      - "traefik.http.services.code-server.loadbalancer.server.port=8080"
networks:
  traefik:
    external: true
