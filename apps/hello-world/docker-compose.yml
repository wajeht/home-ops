services:
  hello-world:
    image: ghcr.io/wajeht/hello-world:513c4ed
    env_file:
      - .env
    networks:
      - traefik
      - internal
    depends_on:
      hello-world-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hello-world.rule=Host(`hello-world.jaw.dev`)"
      - "traefik.http.routers.hello-world.entrypoints=websecure"
      - "traefik.http.routers.hello-world.middlewares=rate-limit-global@file"
      - "traefik.http.services.hello-world.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  hello-world-db:
    container_name: hello-world-db
    image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
    env_file:
      - .env
    environment:
      - POSTGRES_USER=hello
      - POSTGRES_DB=hello
    volumes:
      - /home/jaw/data/hello-world/db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hello"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  traefik:
    external: true
  internal:
