services:
  hello-world:
    image: ghcr.io/wajeht/hello-world:e33b264
    env_file:
      - .env
    networks:
      - traefik
      - internal
    depends_on:
      hello-world-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hello-world.rule=Host(`hello-world.jaw.dev`)"
      - "traefik.http.routers.hello-world.entrypoints=websecure"
      - "traefik.http.routers.hello-world.middlewares=rate-limit-global@file"
      - "traefik.http.services.hello-world.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hello-world-db:
    container_name: hello-world-db
    image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
    env_file:
      - .env
    environment:
      - POSTGRES_USER=hello
      - POSTGRES_DB=hello
    volumes:
      - /home/jaw/data/hello-world/db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hello"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  hello-world-borgmatic:
    container_name: hello-world-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /home/jaw/backup/hello-world:/repository
      - /home/jaw/data/hello-world/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
      - internal
    depends_on:
      hello-world-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "borgmatic --version"]
      interval: 1m
      timeout: 10s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik:
    external: true
  internal:
