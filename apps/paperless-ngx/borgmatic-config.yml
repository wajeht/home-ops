postgresql_databases:
  - name: paperless
    hostname: paperless-db
    username: paperless
    format: custom

repositories:
  - path: /repository
    label: paperless

archive_name_format: "paperless-{now:%Y-%m-%d-%H%M%S}"
compression: zstd,3

keep_daily: 7
keep_weekly: 4
keep_monthly: 6

checks:
  - name: repository
    frequency: 1 week
  - name: archives
    frequency: 1 week

check_last: 3

ntfy:
  topic: borgmatic
  server: http://ntfy:80
  finish:
    title: "paperless db backup complete"
    message: "paperless database backup finished"
    priority: min
    tags: white_check_mark
  fail:
    title: "paperless db backup FAILED"
    message: "paperless database backup failed"
    priority: max
    tags: skull
  states:
    - finish
    - fail
