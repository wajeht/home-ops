services:
  prowlarr:
    container_name: prowlarr
    image: linuxserver/prowlarr:nightly-2.3.3.5296-ls226@sha256:6359081d2f40ce5116354f6a5e2975f42a33a04407ad2576f1010c510725a8fd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/prowlarr:/config
    networks:
      - traefik
      - media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.jaw.dev`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.middlewares=google-auth@file"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
  prowlarr-borgmatic:
    container_name: prowlarr-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.2@sha256:961533d6135fd67736e9fee0f7cebc4926b57840d4a210be0a0cf2de6b004996
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
    volumes:
      - /home/jaw/data/prowlarr:/source/data
      - /home/jaw/backup/prowlarr:/repository
      - /home/jaw/data/prowlarr/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "borgmatic --version"]
      interval: 1m
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  traefik:
    external: true
  backup:
    external: true
  media:
    external: true
