services:
  walker:
    image: ghcr.io/wajeht/walker:v0.0.15
    container_name: walker
    env_file:
      - .env
    environment:
      TZ: America/Chicago
      NOTIFICATION_URL: http://ntfy:80/walker?template=walker&markdown=yes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/jaw/data/walker:/data
      - /home/jaw/data/walker-cache:/cache
      - ./walker.yml:/config/walker.yml:ro
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.walker.rule=Host(`walker.jaw.dev`)"
      - "traefik.http.routers.walker.entrypoints=websecure"
      - "traefik.http.routers.walker.middlewares=google-auth@file"
      - "traefik.http.services.walker.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
