services:
  ip:
    image: ghcr.io/wajeht/ip:0e7820d
    environment:
      - TZ=America/Chicago
      - PORT=80
      - NODE_ENV=production
    networks:
      - traefik
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ip.rule=Host(`ip.jaw.dev`)"
      - "traefik.http.routers.ip.entrypoints=websecure"
      - "traefik.http.routers.ip.middlewares=rate-limit-global@file"
      - "traefik.http.services.ip.loadbalancer.server.port=80"
networks:
  traefik:
    external: true
