services:
  glitchtip:
    container_name: glitchtip
    image: glitchtip/glitchtip:6@sha256:283ead64eac9daa01b0c8be3efa8086e075c7c9f1b21d78d3eaf69d94ddc1be4
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://glitchtip:${POSTGRES_PASSWORD}@glitchtip-db:5432/glitchtip
      - VALKEY_URL=
      - SERVER_ROLE=all_in_one
      - GLITCHTIP_DOMAIN=https://glitchtip.jaw.dev
      - DEFAULT_FROM_EMAIL=glitchtip@jaw.dev
      - EMAIL_URL=consolemail://
      - ENABLE_USER_REGISTRATION=False
      - ENABLE_ORGANIZATION_CREATION=False
      - ENABLE_ADMIN=False
      - ENABLE_OPENAPI=False
      - GLITCHTIP_MAX_EVENT_LIFE_DAYS=90
    depends_on:
      glitchtip-db:
        condition: service_healthy
    volumes:
      - /home/jaw/data/glitchtip/uploads:/code/uploads
    networks:
      - traefik
      - glitchtip-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/_health/'', timeout=5)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glitchtip.rule=Host(`glitchtip.jaw.dev`)"
      - "traefik.http.routers.glitchtip.entrypoints=websecure"
      - "traefik.http.routers.glitchtip.middlewares=google-auth@file"
      - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"
  glitchtip-db:
    container_name: glitchtip-db
    image: postgres:18-alpine@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
    env_file:
      - .env
    environment:
      - POSTGRES_USER=glitchtip
      - POSTGRES_DB=glitchtip
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - /home/jaw/data/glitchtip/db:/var/lib/postgresql/data
    networks:
      - glitchtip-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    stop_grace_period: 30s
    init: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    shm_size: 256m
    oom_score_adj: -300
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  glitchtip-borgmatic:
    container_name: glitchtip-borgmatic
    image: ghcr.io/borgmatic-collective/borgmatic:2.1.3@sha256:529ef5f19838b650e07de2cdf91e0f403d849cf83636baacc6ec8a55e2a76f79
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - EXTRA_PKGS=postgresql18-client
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - /home/jaw/data/glitchtip:/source/data:ro
      - /home/jaw/backup/glitchtip:/repository
      - /home/jaw/data/glitchtip/borgmatic:/borgmatic/state
      - ./borgmatic-config.yml:/etc/borgmatic/config.yaml:ro
      - ./borgmatic-crontab.txt:/etc/borgmatic.d/crontab.txt:ro
    networks:
      - traefik
      - glitchtip-internal
    depends_on:
      glitchtip-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "borgmatic --version"]
      interval: 1m
      timeout: 10s
      retries: 3
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik:
    external: true
  glitchtip-internal:
