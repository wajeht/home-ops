postgresql_databases:
  - name: immich
    hostname: immich-db
    username: immich
    format: custom

repositories:
  - path: /repository
    label: immich

archive_name_format: "immich-{now:%Y-%m-%d-%H%M%S}"
compression: zstd,3

keep_daily: 7
keep_weekly: 4
keep_monthly: 6

checks:
  - name: repository
    frequency: 1 week
  - name: archives
    frequency: 1 week

check_last: 3

ntfy:
  topic: borgmatic
  server: http://ntfy:80
  finish:
    title: "immich backup complete"
    message: "immich backup finished"
    priority: min
    tags: white_check_mark
  fail:
    title: "immich backup FAILED"
    message: "immich backup failed"
    priority: max
    tags: skull
  states:
    - finish
    - fail
