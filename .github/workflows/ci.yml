name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: [self-hosted, linux, default]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
      - name: Install tools
        run: |
          command -v shellcheck &>/dev/null || sudo apt-get install -y shellcheck
          command -v shfmt &>/dev/null || sudo apt-get install -y shfmt
      - name: Check formatting
        run: |
          npx oxfmt --check "**/*.{yml,yaml,md,json}" '!apps/adguard/**'
          shfmt -d -i 0 -ci scripts/*.sh
      - run: ./scripts/lint.sh

  sync:
    if: github.event_name == 'push'
    needs: lint
    runs-on: [self-hosted, linux, default]
    steps:
      - name: Trigger docker-cd sync
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.DOCKER_CD_API_SECRET }}" \
            "${{ secrets.DOCKER_CD_URL }}/api/sync" | jq .
